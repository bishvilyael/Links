<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>קישורים</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      direction: rtl;
      background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url("background.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 18px;
      padding: 28px 22px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 28px;
      color: #2f3a2f;
    }

    .subtitle {
      margin-bottom: 24px;
      color: #555;
      font-size: 16px;
    }

    .link-button {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 15px 18px;
      background: #ffffff;
      border: 1px solid #d7ddd2;
      border-radius: 12px;
      text-decoration: none;
      color: #1f4f35;
      font-size: 19px;
      font-weight: bold;
      transition: 0.2s;
    }

    .link-button:hover {
      background: #edf4ea;
      transform: translateY(-2px);
    }

    @media (max-width: 600px) {
      body {
        padding: 14px;
        align-items: flex-start;
        background-attachment: scroll;
      }

      .card {
        margin-top: 24px;
        padding: 22px 16px;
        border-radius: 16px;
      }

      h1 {
        font-size: 24px;
      }

      .link-button {
        font-size: 17px;
        padding: 14px;
      }
    }
  </style>
</head>

<body>

  <main class="card">
    <h1>מפות יעלים</h1>
    <div class="subtitle">קישורים למפות ולתוצרים</div>

    <a class="link-button" href="https://bishvilyael.github.io/FullMap/" target="_blank" rel="noopener">
      מפה מצטברת
    </a>

    <a class="link-button" href="https://bishvilyael.github.io/PartialMap_Multi/" target="_blank" rel="noopener">
      מפה תקופתית
    </a>

    <a class="link-button" href="https://bishvilyael.github.io/Badge_Map/" target="_blank" rel="noopener">
      מפות אישיות לפי יעל
    </a>
  </main>

</body>
</html>
